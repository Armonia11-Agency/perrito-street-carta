<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Carta - Perrito Street</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            background: #1a1a1a;
            overflow-x: hidden;
        }

        .pages-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            width: 100%;
        }

        .page {
            width: 100%;
            max-width: 900px;
            display: block;
            line-height: 0;
            border-bottom: 4px solid #9B2020;
        }

        .page img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Página 19 con QR clickeable */
        .page-qr {
            position: relative;
            width: 100%;
            max-width: 900px;
            line-height: 0;
            border-bottom: 4px solid #9B2020;
        }

        .page-qr img {
            width: 100%;
            height: auto;
            display: block;
        }

        .qr-link {
            position: absolute;
            /* El QR está centrado horizontalmente y ocupa la mitad inferior de la página */
            left: 15%;
            right: 15%;
            top: 55%;
            bottom: 8%;
            display: block;
            cursor: pointer;
            /* Transparente — no cambia el diseño visual */
            background: transparent;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="pages-wrapper">
        <div class="page"><img src="pages/page_01.jpg" alt="Página 1" loading="eager"></div>
        <div class="page"><img src="pages/page_02.jpg" alt="Página 2" loading="lazy"></div>
        <div class="page"><img src="pages/page_03.jpg" alt="Página 3" loading="lazy"></div>
        <div class="page"><img src="pages/page_04.jpg" alt="Página 4" loading="lazy"></div>
        <div class="page"><img src="pages/page_05.jpg" alt="Página 5" loading="lazy"></div>
        <div class="page"><img src="pages/page_06.jpg" alt="Página 6" loading="lazy"></div>
        <div class="page"><img src="pages/page_07.jpg" alt="Página 7" loading="lazy"></div>
        <div class="page"><img src="pages/page_08.jpg" alt="Página 8" loading="lazy"></div>
        <div class="page"><img src="pages/page_09.jpg" alt="Página 9" loading="lazy"></div>
        <div class="page"><img src="pages/page_10.jpg" alt="Página 10" loading="lazy"></div>
        <div class="page"><img src="pages/page_11.jpg" alt="Página 11" loading="lazy"></div>
        <div class="page"><img src="pages/page_12.jpg" alt="Página 12" loading="lazy"></div>
        <div class="page"><img src="pages/page_13.jpg" alt="Página 13" loading="lazy"></div>
        <div class="page"><img src="pages/page_14.jpg" alt="Página 14" loading="lazy"></div>
        <div class="page"><img src="pages/page_15.jpg" alt="Página 15" loading="lazy"></div>
        <div class="page"><img src="pages/page_16.jpg" alt="Página 16" loading="lazy"></div>
        <div class="page"><img src="pages/page_17.jpg" alt="Página 17" loading="lazy"></div>
        <div class="page"><img src="pages/page_18.jpg" alt="Página 18" loading="lazy"></div>
        <div class="page-qr">
            <img src="pages/page_19.jpg" alt="Página 19" loading="lazy">
            <a class="qr-link" href="https://search.google.com/local/writereview?placeid=ChIJ1-lxPd2DYw0RWmUoCBJcXfE" target="_blank" rel="noopener" aria-label="Déjanos tu reseña en Google"></a>
        </div>
    </div>
</body>
</html>
